# ============================================
# Spring Profile Configuration
# ============================================
# Default profile: dev (for local development)
# Production profile: prod (for Render deployment)
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# ============================================
# Common Configuration (All Profiles)
# ============================================

# JPA/Hibernate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Thymeleaf
spring.thymeleaf.cache=false

# File Upload
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=${MAX_FILE_SIZE:10MB}
spring.servlet.multipart.max-request-size=${MAX_REQUEST_SIZE:10MB}

# Static Resources
spring.web.resources.static-locations=classpath:/static/,file:img/

# Logging
logging.level.org.springframework.security=INFO
logging.level.com.example.foodshop=INFO

# Actuator (for health checks)
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized

# JWT Configuration (Override in profiles if needed)
jwt.secret=${JWT_SECRET:5367566B59703373367639792F423F4528482B4D6251655468576D5A71347437}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Cloudinary Configuration
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:}
cloudinary.api-key=${CLOUDINARY_API_KEY:}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:}
cloudinary.folder=${CLOUDINARY_FOLDER:food-shop}
cloudinary.enabled=${CLOUDINARY_ENABLED:false}

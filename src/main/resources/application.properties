# ============================================
# Spring Profile Configuration
# ============================================
# Default profile: dev (for local development)
# Production profile: prod (for Render deployment)
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# ============================================
# Common Configuration (All Profiles)
# ============================================

# JPA/Hibernate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Thymeleaf
spring.thymeleaf.cache=false

# File Upload
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=${MAX_FILE_SIZE:10MB}
spring.servlet.multipart.max-request-size=${MAX_REQUEST_SIZE:10MB}

# Static Resources
spring.web.resources.static-locations=classpath:/static/,file:img/

# Logging
logging.level.org.springframework.security=INFO
logging.level.com.example.foodshop=INFO

# Health check only
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=when-authorized

# JWT Configuration (Override in profiles if needed)
jwt.secret=${JWT_SECRET:5367566B59703373367639792F423F4528482B4D6251655468576D5A71347437}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Cloudinary Configuration
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:}
cloudinary.api-key=${CLOUDINARY_API_KEY:}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:}
cloudinary.folder=${CLOUDINARY_FOLDER:food-shop}
cloudinary.enabled=${CLOUDINARY_ENABLED:false}

# ============================================
# Google Gemini AI Configuration (FREE!)
# ============================================
# Get your FREE API key from: https://aistudio.google.com/app/apikey
gemini.api.key=${GEMINI_API_KEY:}

# ============================================
# Redis Configuration (JWT Blacklist & Rate Limiting)
# ============================================
# Priority: REDIS_URL > Individual parameters
# Option 1: Full connection string (Railway style)
# Option 2: Individual parameters (Aiven style)

# If REDIS_URL is set, use it directly
spring.data.redis.url=${REDIS_URL:}

# Otherwise, use individual parameters
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}

# SSL Configuration (Aiven/Valkey may require SSL)
spring.data.redis.ssl.enabled=${REDIS_SSL:false}

# Connection settings
spring.data.redis.timeout=60000
spring.data.redis.jedis.pool.max-active=8
spring.data.redis.jedis.pool.max-idle=8
spring.data.redis.jedis.pool.min-idle=0

# ============================================
# Rate Limiting Configuration (Bucket4j + Redis)
# ============================================
# Rate limiting is automatically enabled when Redis is available
# If Redis is down, rate limiting is disabled (fail-open policy)
# 
# Default limits:
# - Login: 5 attempts per minute per IP
# - Register: 3 registrations per hour per IP
# - Chatbot: 20 messages per minute per user
# - Order: 10 orders per hour per user
# - Review: 5 reviews per hour per user
# - General API: 100 requests per minute per IP

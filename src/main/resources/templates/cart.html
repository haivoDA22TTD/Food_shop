<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giỏ hàng - Food Shop</title>
    <link rel="stylesheet" th:href="@{/css/modern-style.css}">
    <link rel="stylesheet" th:href="@{/css/animations.css}">
    <style>
        .cart-container {
            max-width: 1200px;
            margin: 3rem auto;
            padding: 2rem;
        }
        
        .cart-title {
            font-size: 2rem;
            margin-bottom: 2rem;
            color: var(--dark-color);
        }
        
        .cart-content {
            display: grid;
            grid-template-columns: 1fr 400px;
            gap: 2rem;
        }
        
        .cart-items {
            background: white;
            border-radius: 12px;
            padding: 2rem;
            box-shadow: var(--box-shadow);
        }
        
        .cart-item {
            display: grid;
            grid-template-columns: 100px 1fr auto;
            gap: 1.5rem;
            padding: 1.5rem 0;
            border-bottom: 1px solid #eee;
            align-items: center;
        }
        
        .cart-item:last-child {
            border-bottom: none;
        }
        
        .item-image {
            width: 100px;
            height: 100px;
            object-fit: cover;
            border-radius: 8px;
        }
        
        .item-info h3 {
            margin-bottom: 0.5rem;
            color: var(--dark-color);
        }
        
        .item-price {
            color: var(--primary-color);
            font-size: 1.2rem;
            font-weight: bold;
        }
        
        .item-actions {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            align-items: flex-end;
        }
        
        .quantity-control {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: var(--light-color);
            border-radius: 8px;
            padding: 0.5rem;
        }
        
        .quantity-btn {
            width: 32px;
            height: 32px;
            border: none;
            background: var(--gradient);
            color: white;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
        }
        
        .quantity-btn:hover {
            transform: scale(1.1);
        }
        
        .quantity-input {
            width: 50px;
            text-align: center;
            border: none;
            background: transparent;
            font-weight: bold;
            font-size: 1rem;
        }
        
        .btn-remove {
            background: #ef4444;
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: var(--transition);
        }
        
        .btn-remove:hover {
            background: #dc2626;
        }
        
        .cart-summary {
            background: white;
            border-radius: 12px;
            padding: 2rem;
            box-shadow: var(--box-shadow);
            height: fit-content;
            position: sticky;
            top: 100px;
        }
        
        .summary-title {
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
            color: var(--dark-color);
        }
        
        .summary-row {
            display: flex;
            justify-content: space-between;
            padding: 0.75rem 0;
            border-bottom: 1px solid #eee;
        }
        
        .summary-row.total {
            border-top: 2px solid var(--primary-color);
            border-bottom: none;
            margin-top: 1rem;
            padding-top: 1rem;
            font-size: 1.3rem;
            font-weight: bold;
            color: var(--primary-color);
        }
        
        .btn-checkout {
            width: 100%;
            padding: 1rem;
            background: var(--gradient);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 1.5rem;
            transition: var(--transition);
        }
        
        .btn-checkout:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(14, 165, 233, 0.3);
        }
        
        .empty-cart {
            text-align: center;
            padding: 4rem 2rem;
        }
        
        .empty-cart-icon {
            font-size: 5rem;
            margin-bottom: 1rem;
        }
        
        .empty-cart h2 {
            color: var(--dark-color);
            margin-bottom: 1rem;
        }
        
        .btn-continue {
            display: inline-block;
            padding: 0.875rem 2rem;
            background: var(--gradient);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            margin-top: 1rem;
            transition: var(--transition);
        }
        
        .btn-continue:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(14, 165, 233, 0.3);
        }
        
        @media (max-width: 768px) {
            .cart-content {
                grid-template-columns: 1fr;
            }
            
            .cart-item {
                grid-template-columns: 80px 1fr;
            }
            
            .item-actions {
                grid-column: 1 / -1;
                flex-direction: row;
                justify-content: space-between;
                margin-top: 1rem;
            }
        }
    </style>
</head>
<body>
    <header>
        <nav class="navbar">
            <a href="/" class="logo">🍔 Food Shop</a>
            <div class="nav-links">
                <a href="/">Trang chủ</a>
                <a href="/cart" class="cart-icon">
                    🛒 Giỏ hàng
                    <span class="cart-count">0</span>
                </a>
                <a href="/login" id="loginLink">Đăng nhập</a>
                <a href="/admin" id="adminLink" style="display: none;">Admin</a>
            </div>
        </nav>
    </header>
    
    <div class="cart-container">
        <h1 class="cart-title">🛒 Giỏ hàng của bạn</h1>
        
        <div id="emptyCart" class="empty-cart" style="display: none;">
            <div class="empty-cart-icon">🛒</div>
            <h2>Giỏ hàng trống</h2>
            <p>Bạn chưa có sản phẩm nào trong giỏ hàng</p>
            <a href="/" class="btn-continue">Tiếp tục mua sắm</a>
        </div>
        
        <div id="cartContent" class="cart-content">
            <div class="cart-items" id="cartItems">
                <!-- Cart items will be inserted here by JavaScript -->
            </div>
            
            <div class="cart-summary">
                <h2 class="summary-title">Tóm tắt đơn hàng</h2>
                <div class="summary-row">
                    <span>Tạm tính:</span>
                    <span id="subtotal">0đ</span>
                </div>
                <div class="summary-row">
                    <span>Phí vận chuyển:</span>
                    <span id="shipping">30,000đ</span>
                </div>
                <div class="summary-row">
                    <span>Giảm giá:</span>
                    <span id="discount">0đ</span>
                </div>
                <div class="summary-row total">
                    <span>Tổng cộng:</span>
                    <span id="total">0đ</span>
                </div>
                <button class="btn-checkout" onclick="checkout()">Thanh toán</button>
                <a href="/" class="btn-continue" style="display: block; text-align: center; margin-top: 1rem;">
                    ← Tiếp tục mua sắm
                </a>
            </div>
        </div>
    </div>
    
    <script th:src="@{/js/notifications.js}"></script>
    <script th:inline="javascript">
        /*<![CDATA[*/
        const products = /*[[${products}]]*/ [];
        /*]]>*/
        
        // Load cart from localStorage
        function loadCart() {
            const cart = JSON.parse(localStorage.getItem('cart') || '[]');
            const cartItemsContainer = document.getElementById('cartItems');
            const emptyCart = document.getElementById('emptyCart');
            const cartContent = document.getElementById('cartContent');
            
            if (cart.length === 0) {
                emptyCart.style.display = 'block';
                cartContent.style.display = 'none';
                return;
            }
            
            emptyCart.style.display = 'none';
            cartContent.style.display = 'grid';
            
            cartItemsContainer.innerHTML = '';
            let subtotal = 0;
            
            cart.forEach(item => {
                const product = products.find(p => p.id == item.id);
                if (product) {
                    const itemTotal = product.price * item.quantity;
                    subtotal += itemTotal;
                    
                    const cartItemHTML = `
                        <div class="cart-item" data-id="${product.id}">
                            <img src="/img/${product.image}" alt="${product.name}" class="item-image">
                            <div class="item-info">
                                <h3>${product.name}</h3>
                                <p class="item-price">${formatPrice(product.price)}</p>
                            </div>
                            <div class="item-actions">
                                <div class="quantity-control">
                                    <button class="quantity-btn" onclick="updateQuantity(${product.id}, -1)">−</button>
                                    <input type="text" class="quantity-input" value="${item.quantity}" readonly>
                                    <button class="quantity-btn" onclick="updateQuantity(${product.id}, 1)">+</button>
                                </div>
                                <div style="font-weight: bold; color: var(--primary-color);">
                                    ${formatPrice(itemTotal)}
                                </div>
                                <button class="btn-remove" onclick="removeItem(${product.id})">Xóa</button>
                            </div>
                        </div>
                    `;
                    cartItemsContainer.innerHTML += cartItemHTML;
                }
            });
            
            updateSummary(subtotal);
        }
        
        function updateQuantity(productId, change) {
            let cart = JSON.parse(localStorage.getItem('cart') || '[]');
            const item = cart.find(i => i.id == productId);
            
            if (item) {
                item.quantity += change;
                if (item.quantity <= 0) {
                    cart = cart.filter(i => i.id != productId);
                    toast.info('Đã xóa sản phẩm khỏi giỏ hàng');
                }
                localStorage.setItem('cart', JSON.stringify(cart));
                loadCart();
                updateCartCount();
            }
        }
        
        function removeItem(productId) {
            let cart = JSON.parse(localStorage.getItem('cart') || '[]');
            cart = cart.filter(i => i.id != productId);
            localStorage.setItem('cart', JSON.stringify(cart));
            toast.info('Đã xóa sản phẩm khỏi giỏ hàng');
            loadCart();
            updateCartCount();
        }
        
        function updateSummary(subtotal) {
            const shipping = subtotal > 0 ? 30000 : 0;
            const discount = 0;
            const total = subtotal + shipping - discount;
            
            document.getElementById('subtotal').textContent = formatPrice(subtotal);
            document.getElementById('shipping').textContent = formatPrice(shipping);
            document.getElementById('discount').textContent = formatPrice(discount);
            document.getElementById('total').textContent = formatPrice(total);
        }
        
        function formatPrice(price) {
            return new Intl.NumberFormat('vi-VN').format(price) + 'đ';
        }
        
        function updateCartCount() {
            const cart = JSON.parse(localStorage.getItem('cart') || '[]');
            const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
            const cartCountElement = document.querySelector('.cart-count');
            if (cartCountElement) {
                cartCountElement.textContent = totalItems;
            }
        }
        
        function checkout() {
            const token = localStorage.getItem('token');
            if (!token) {
                toast.warning('Vui lòng đăng nhập để thanh toán!');
                setTimeout(() => window.location.href = '/login', 1500);
                return;
            }
            
            const cart = JSON.parse(localStorage.getItem('cart') || '[]');
            if (cart.length === 0) {
                toast.warning('Giỏ hàng trống!');
                return;
            }
            
            window.location.href = '/checkout';
        }
        
        // Check login status
        function checkLoginStatus() {
            const token = localStorage.getItem('token');
            const username = localStorage.getItem('username');
            const role = localStorage.getItem('role');
            
            const loginLink = document.getElementById('loginLink');
            const adminLink = document.getElementById('adminLink');
            
            if (token && username) {
                loginLink.textContent = '👤 ' + username;
                loginLink.href = '#';
                loginLink.onclick = function(e) {
                    e.preventDefault();
                    if (confirm('Bạn có muốn đăng xuất?')) {
                        localStorage.clear();
                        window.location.reload();
                    }
                };
                
                if (role && role.includes('ADMIN')) {
                    adminLink.style.display = 'inline-block';
                }
            }
        }
        
        // Initialize
        loadCart();
        updateCartCount();
        checkLoginStatus();
    </script>
</body>
</html>

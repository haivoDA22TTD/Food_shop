<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - Food Shop</title>
    <link rel="stylesheet" th:href="@{/css/modern-style.css}">
    <link rel="stylesheet" th:href="@{/css/animations.css}">
</head>
<body>
    <header>
        <nav class="navbar">
            <a href="/" class="logo">🍔 Food Shop</a>
            <div class="nav-links">
                <a href="/">Trang chủ</a>
                <a href="/register">Đăng ký</a>
            </div>
        </nav>
    </header>
    
    <div class="auth-container">
        <h2 class="auth-title">Đăng nhập</h2>
        <form id="loginForm">
            <div class="form-group">
                <label>Tên đăng nhập</label>
                <input type="text" name="username" id="username" required placeholder="Nhập tên đăng nhập">
            </div>
            <div class="form-group">
                <label>Mật khẩu</label>
                <input type="password" name="password" id="password" required placeholder="Nhập mật khẩu">
            </div>
            <button type="submit" class="btn-primary">Đăng nhập</button>
        </form>
        <div class="auth-footer">
            <p>Chưa có tài khoản? <a href="/register">Đăng ký ngay</a></p>
        </div>
    </div>
    
    <script th:src="@{/js/notifications.js}"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            loading.show('Đang đăng nhập...');
            
            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, password })
                });
                
                loading.hide();
                
                if (response.ok) {
                    const data = await response.json();
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('username', data.username);
                    localStorage.setItem('role', data.role);
                    
                    toast.success('Đăng nhập thành công!');
                    
                    // Redirect based on role
                    setTimeout(() => {
                        if (data.role.includes('ADMIN')) {
                            window.location.href = '/admin';
                        } else {
                            window.location.href = '/';
                        }
                    }, 1000);
                } else {
                    toast.error('Đăng nhập thất bại! Vui lòng kiểm tra lại thông tin.');
                }
            } catch (error) {
                loading.hide();
                toast.error('Có lỗi xảy ra: ' + error.message);
            }
        });
    </script>
</body>
</html>

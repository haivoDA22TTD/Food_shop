<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý người dùng - Admin</title>
    <link rel="stylesheet" th:href="@{/css/modern-style.css}">
    <style>
        .admin-container {
            max-width: 1400px;
            margin: 2rem auto;
            padding: 2rem;
        }
        
        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }
        
        .stats-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }
        
        .stat-card {
            background: white;
            padding: 1.5rem;
            border-radius: 12px;
            box-shadow: var(--box-shadow);
            text-align: center;
        }
        
        .stat-card h3 {
            color: #666;
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
        }
        
        .stat-card .number {
            font-size: 2rem;
            font-weight: bold;
            color: var(--primary-color);
        }
        
        .user-table {
            width: 100%;
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: var(--box-shadow);
        }
        
        .user-table table {
            width: 100%;
            border-collapse: collapse;
        }
        
        .user-table th {
            background: var(--gradient);
            color: white;
            padding: 1rem;
            text-align: left;
            font-weight: 600;
        }
        
        .user-table td {
            padding: 1rem;
            border-bottom: 1px solid #eee;
        }
        
        .user-table tr:hover {
            background: #f8f9fa;
        }
        
        .role-badge {
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
        }
        
        .role-admin {
            background: linear-gradient(135deg, #8b5cf6, #06b6d4);
            color: white;
        }
        
        .role-customer {
            background: #e0f2fe;
            color: #0369a1;
        }
        
        .btn-action {
            padding: 0.5rem 1rem;
            border-radius: 6px;
            text-decoration: none;
            font-size: 0.9rem;
            border: none;
            cursor: pointer;
            transition: var(--transition);
        }
        
        .btn-view {
            background: #0ea5e9;
            color: white;
        }
        
        .btn-delete {
            background: #ef4444;
            color: white;
            margin-left: 0.5rem;
        }
        
        .btn-action:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }
    </style>
</head>
<body>
    <header>
        <nav class="navbar">
            <a href="/" class="logo">🍔 Food Shop - Admin</a>
            <div class="nav-links">
                <a href="/admin">📊 Dashboard</a>
                <a href="/admin/products">📦 Sản phẩm</a>
                <a href="/admin/orders">🛒 Đơn hàng</a>
                <a href="/admin/users">👥 Người dùng</a>
            </div>
        </nav>
    </header>
    
    <div class="admin-container">
        <div class="admin-header">
            <h1>Quản lý người dùng</h1>
        </div>
        
        <div class="stats-cards">
            <div class="stat-card">
                <h3>Tổng người dùng</h3>
                <div class="number" th:text="${users.size()}">0</div>
            </div>
            
            <div class="stat-card">
                <h3>Admin</h3>
                <div class="number" th:text="${adminCount}">0</div>
            </div>
            
            <div class="stat-card">
                <h3>Khách hàng</h3>
                <div class="number" th:text="${customerCount}">0</div>
            </div>
        </div>
        
        <div class="user-table">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Tên đăng nhập</th>
                        <th>Email</th>
                        <th>Số điện thoại</th>
                        <th>Địa chỉ</th>
                        <th>Vai trò</th>
                        <th>Ngày tạo</th>
                        <th>Thao tác</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="user : ${users}">
                        <td th:text="${user.id}"></td>
                        <td th:text="${user.username}"></td>
                        <td th:text="${user.email}"></td>
                        <td th:text="${user.phone ?: 'N/A'}"></td>
                        <td th:text="${user.address ?: 'N/A'}"></td>
                        <td>
                            <span class="role-badge" 
                                  th:classappend="${user.role == T(com.example.foodshop.entity.User.Role).ADMIN} ? 'role-admin' : 'role-customer'"
                                  th:text="${user.role}">
                            </span>
                        </td>
                        <td th:text="${user.createdAt != null ? #temporals.format(user.createdAt, 'dd/MM/yyyy') : 'N/A'}"></td>
                        <td>
                            <button class="btn-action btn-view" th:onclick="'viewUser(' + ${user.id} + ')'">Xem</button>
                            <button class="btn-action btn-delete" 
                                    th:if="${user.role != T(com.example.foodshop.entity.User.Role).ADMIN}"
                                    th:onclick="'deleteUser(' + ${user.id} + ', \'' + ${user.username} + '\')'">
                                Xóa
                            </button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
    
    <script>
        function viewUser(id) {
            alert('Chức năng xem chi tiết user #' + id + ' đang phát triển');
        }
        
        function deleteUser(id, username) {
            if (confirm('Bạn có chắc muốn xóa người dùng "' + username + '"?')) {
                window.location.href = '/admin/users/delete/' + id;
            }
        }
    </script>
</body>
</html>

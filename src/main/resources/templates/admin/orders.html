<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý đơn hàng - Admin</title>
    <link rel="stylesheet" th:href="@{/css/modern-style.css}">
    <style>
        .admin-container {
            max-width: 1400px;
            margin: 2rem auto;
            padding: 2rem;
        }
        
        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }
        
        .filter-tabs {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }
        
        .filter-tab {
            padding: 0.75rem 1.5rem;
            border: 2px solid var(--primary-color);
            background: white;
            color: var(--primary-color);
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: var(--transition);
        }
        
        .filter-tab:hover,
        .filter-tab.active {
            background: var(--gradient);
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(14, 165, 233, 0.3);
        }
        
        .stats-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }
        
        .stat-card {
            background: white;
            padding: 1.5rem;
            border-radius: 12px;
            box-shadow: var(--box-shadow);
            text-align: center;
        }
        
        .stat-card h3 {
            color: #666;
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
        }
        
        .stat-card .number {
            font-size: 2rem;
            font-weight: bold;
            color: var(--primary-color);
        }
        
        .order-table {
            width: 100%;
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: var(--box-shadow);
        }
        
        .order-table table {
            width: 100%;
            border-collapse: collapse;
        }
        
        .order-table th {
            background: var(--gradient);
            color: white;
            padding: 1rem;
            text-align: left;
            font-weight: 600;
        }
        
        .order-table td {
            padding: 1rem;
            border-bottom: 1px solid #eee;
        }
        
        .order-table tr:hover {
            background: #f8f9fa;
        }
        
        .status-badge {
            padding: 0.35rem 0.85rem;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            display: inline-block;
        }
        
        .status-pending {
            background: #fef3c7;
            color: #92400e;
        }
        
        .status-confirmed {
            background: #dbeafe;
            color: #1e40af;
        }
        
        .status-shipping {
            background: #e0e7ff;
            color: #4338ca;
        }
        
        .status-delivered {
            background: #d1fae5;
            color: #065f46;
        }
        
        .status-cancelled {
            background: #fee2e2;
            color: #991b1b;
        }
        
        .btn-action {
            padding: 0.5rem 1rem;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            transition: var(--transition);
            margin-right: 0.5rem;
        }
        
        .btn-view {
            background: var(--gradient);
            color: white;
        }
        
        .btn-update {
            background: #8b5cf6;
            color: white;
        }
        
        .btn-action:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(14, 165, 233, 0.3);
        }
    </style>
</head>
<body>
    <header>
        <nav class="navbar">
            <a href="/" class="logo">🍔 Food Shop - Admin</a>
            <div class="nav-links">
                <a href="/admin">📊 Dashboard</a>
                <a href="/admin/products">📦 Sản phẩm</a>
                <a href="/admin/orders">🛒 Đơn hàng</a>
                <a href="/admin/users">👥 Người dùng</a>
            </div>
        </nav>
    </header>
    
    <div class="admin-container">
        <div class="admin-header">
            <h1>Quản lý đơn hàng</h1>
        </div>
        
        <div class="stats-cards">
            <div class="stat-card">
                <h3>Tổng đơn hàng</h3>
                <div class="number" th:text="${orders.size()}">0</div>
            </div>
            
            <div class="stat-card">
                <h3>Chờ xử lý</h3>
                <div class="number" th:text="${pendingCount}">0</div>
            </div>
            
            <div class="stat-card">
                <h3>Đang giao</h3>
                <div class="number" th:text="${shippingCount}">0</div>
            </div>
            
            <div class="stat-card">
                <h3>Hoàn thành</h3>
                <div class="number" th:text="${deliveredCount}">0</div>
            </div>
        </div>
        
        <div class="filter-tabs">
            <button class="filter-tab active" onclick="filterOrders('all')">Tất cả</button>
            <button class="filter-tab" onclick="filterOrders('PENDING')">Chờ xử lý</button>
            <button class="filter-tab" onclick="filterOrders('CONFIRMED')">Đã xác nhận</button>
            <button class="filter-tab" onclick="filterOrders('SHIPPING')">Đang giao</button>
            <button class="filter-tab" onclick="filterOrders('DELIVERED')">Hoàn thành</button>
            <button class="filter-tab" onclick="filterOrders('CANCELLED')">Đã hủy</button>
        </div>
        
        <div class="order-table">
            <table>
                <thead>
                    <tr>
                        <th>Mã đơn</th>
                        <th>Khách hàng</th>
                        <th>Địa chỉ giao hàng</th>
                        <th>Tổng tiền</th>
                        <th>Thanh toán</th>
                        <th>Trạng thái</th>
                        <th>Ngày đặt</th>
                        <th>Thao tác</th>
                    </tr>
                </thead>
                <tbody id="orderTableBody">
                    <tr th:each="order : ${orders}" th:data-status="${order.status}">
                        <td><strong th:text="'#' + ${order.id}"></strong></td>
                        <td th:text="${order.user.username}"></td>
                        <td th:text="${order.shippingAddress ?: 'N/A'}"></td>
                        <td><strong th:text="${#numbers.formatDecimal(order.totalAmount, 0, 'COMMA', 0, 'POINT')} + 'đ'" style="color: var(--primary-color);"></strong></td>
                        <td th:text="${order.paymentMethod ?: 'COD'}"></td>
                        <td>
                            <span class="status-badge" 
                                  th:classappend="${order.status.name() == 'PENDING'} ? 'status-pending' : 
                                                  (${order.status.name() == 'CONFIRMED'} ? 'status-confirmed' : 
                                                  (${order.status.name() == 'SHIPPING'} ? 'status-shipping' :
                                                  (${order.status.name() == 'DELIVERED'} ? 'status-delivered' : 'status-cancelled')))"
                                  th:text="${order.status}">
                            </span>
                        </td>
                        <td th:text="${#temporals.format(order.createdAt, 'dd/MM/yyyy HH:mm')}"></td>
                        <td>
                            <button class="btn-action btn-view" th:onclick="'viewOrder(' + ${order.id} + ')'">Chi tiết</button>
                            <select th:if="${order.status.name() != 'DELIVERED' && order.status.name() != 'CANCELLED'}"
                                    th:onchange="'updateOrderStatus(' + ${order.id} + ', this.value)'"
                                    style="padding: 0.5rem; border-radius: 6px; border: 2px solid var(--primary-color); background: white; cursor: pointer; margin-left: 0.5rem;">
                                <option value="">Cập nhật trạng thái</option>
                                <option value="PENDING" th:selected="${order.status.name() == 'PENDING'}">Chờ xác nhận</option>
                                <option value="CONFIRMED" th:selected="${order.status.name() == 'CONFIRMED'}">Xác nhận</option>
                                <option value="SHIPPING" th:selected="${order.status.name() == 'SHIPPING'}">Đang giao</option>
                                <option value="DELIVERED" th:selected="${order.status.name() == 'DELIVERED'}">Đã giao</option>
                                <option value="CANCELLED" th:selected="${order.status.name() == 'CANCELLED'}">Hủy đơn</option>
                            </select>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(orders)}">
                        <td colspan="8" style="text-align: center; color: #999; padding: 2rem;">Chưa có đơn hàng nào</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
    
    <script>
        function filterOrders(status) {
            const rows = document.querySelectorAll('#orderTableBody tr[data-status]');
            const tabs = document.querySelectorAll('.filter-tab');
            
            tabs.forEach(tab => tab.classList.remove('active'));
            event.target.classList.add('active');
            
            rows.forEach(row => {
                if (status === 'all' || row.dataset.status === status) {
                    row.style.display = '';
                } else {
                    row.style.display = 'none';
                }
            });
        }
        
        function viewOrder(id) {
            window.location.href = '/admin/orders/detail/' + id;
        }
        
        function updateOrderStatus(id, status) {
            if (!status) return;
            
            const statusNames = {
                'PENDING': 'Chờ xác nhận',
                'CONFIRMED': 'Đã xác nhận',
                'SHIPPING': 'Đang giao hàng',
                'DELIVERED': 'Đã giao hàng',
                'CANCELLED': 'Đã hủy'
            };
            
            if (confirm('Xác nhận cập nhật trạng thái đơn hàng thành: ' + statusNames[status] + '?')) {
                window.location.href = '/admin/orders/update/' + id + '?status=' + status;
            } else {
                event.target.value = '';
            }
        }
    </script>
</body>
</html>

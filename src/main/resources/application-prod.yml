server:
  port: ${PORT:10000}
  max-http-header-size: 64KB
  netty:
    max-initial-line-length: 16384
    max-header-size: 65536

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      httpclient:
        max-header-size: 65536
        response-timeout: 60s
        connect-timeout: 10000
        pool:
          max-idle-time: 30s
      httpserver:
        max-initial-line-length: 16384
        max-header-size: 65536
      default-filters:
        - RemoveRequestHeader=Forwarded
        - RemoveRequestHeader=X-Forwarded-For
        - RemoveRequestHeader=X-Forwarded-Proto
        - RemoveRequestHeader=X-Forwarded-Host
        - RemoveRequestHeader=X-Forwarded-Port
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true

eureka:
  client:
    service-url:
      defaultZone: https://eureka-server-cqff.onrender.com/eureka/
    register-with-eureka: true
    fetch-registry: true
    registry-fetch-interval-seconds: 10
    eureka-server-connect-timeout-seconds: 60
    eureka-server-read-timeout-seconds: 60
    eureka-server-total-connections: 10
    eureka-server-total-connections-per-host: 10
  instance:
    hostname: ${RENDER_EXTERNAL_HOSTNAME}
    prefer-ip-address: false
    non-secure-port-enabled: false
    secure-port-enabled: true
    secure-port: 443
    home-page-url: https://${eureka.instance.hostname}/
    status-page-url: https://${eureka.instance.hostname}/actuator/info
    health-check-url: https://${eureka.instance.hostname}/actuator/health
    lease-renewal-interval-in-seconds: 30
    lease-expiration-duration-in-seconds: 90
    instance-id: ${spring.application.name}:${random.value}

# Logging
logging:
  level:
    org.springframework.cloud.gateway: WARN
    reactor.netty: WARN

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

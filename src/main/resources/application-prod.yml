server:
  port: ${PORT:10000}
  max-http-header-size: 64KB
  netty:
    max-initial-line-length: 16384
    max-header-size: 65536

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      httpclient:
        max-header-size: 65536
        response-timeout: 30s
      httpserver:
        max-initial-line-length: 16384
        max-header-size: 65536
      default-filters:
        - RemoveRequestHeader=Forwarded
        - RemoveRequestHeader=X-Forwarded-For
        - RemoveRequestHeader=X-Forwarded-Proto
        - RemoveRequestHeader=X-Forwarded-Host
        - RemoveRequestHeader=X-Forwarded-Port

eureka:
  client:
    service-url:
      defaultZone: https://eureka-server-cqff.onrender.com/eureka/
    register-with-eureka: true
    fetch-registry: true
    registry-fetch-interval-seconds: 30
    eureka-server-connect-timeout-seconds: 30
    eureka-server-read-timeout-seconds: 30
  instance:
    hostname: localhost
    prefer-ip-address: false
    non-secure-port-enabled: true
    non-secure-port: ${server.port}
    secure-port-enabled: false
    lease-renewal-interval-in-seconds: 30
    lease-expiration-duration-in-seconds: 90
    instance-id: ${spring.application.name}:${random.value}

# Logging
logging:
  level:
    org.springframework.cloud.gateway: WARN
    reactor.netty: WARN

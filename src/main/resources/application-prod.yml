server:
  port: ${PORT:10000}

spring:
  application:
    name: payment-service
  config:
    activate:
      on-profile: prod
    
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USER}
    password: ${DATABASE_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 2
      minimum-idle: 1
      connection-timeout: 60000
      idle-timeout: 300000
      max-lifetime: 600000
      leak-detection-threshold: 60000
      pool-name: PaymentHikariPool
      connection-test-query: SELECT 1
      validation-timeout: 5000
      keepalive-time: 30000
      
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true
        
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}
      username: ${REDIS_USERNAME:default}
      ssl:
        enabled: ${REDIS_SSL_ENABLED:true}
      timeout: 60000
      jedis:
        pool:
          max-active: 2
          max-idle: 1
          min-idle: 0
          max-wait: 3000

# Eureka Configuration
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:https://eureka-server-cqff.onrender.com/eureka/}
    register-with-eureka: true
    fetch-registry: true
    registry-fetch-interval-seconds: 10
    eureka-server-connect-timeout-seconds: 60
    eureka-server-read-timeout-seconds: 60
  instance:
    hostname: ${RENDER_EXTERNAL_HOSTNAME}
    prefer-ip-address: false
    non-secure-port-enabled: false
    secure-port-enabled: true
    secure-port: 443
    home-page-url: https://${eureka.instance.hostname}/
    status-page-url: https://${eureka.instance.hostname}/actuator/info
    health-check-url: https://${eureka.instance.hostname}/actuator/health
    lease-renewal-interval-in-seconds: 30
    lease-expiration-duration-in-seconds: 90
    instance-id: ${spring.application.name}:${random.value}

# JWT Configuration
jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:86400000}

# VNPay Configuration
vnpay:
  tmn-code: ${VNPAY_TMN_CODE}
  hash-secret: ${VNPAY_HASH_SECRET}
  url: ${VNPAY_URL:https://sandbox.vnpayment.vn/paymentv2/vpcpay.html}
  return-url: ${VNPAY_RETURN_URL}

# Application Configuration
app:
  payment:
    timeout-minutes: 15
    auto-cancel-enabled: true
    cache-ttl: 900
    saga-enabled: true
  voucher:
    cache-ttl: 3600
  saga:
    timeout-minutes: 30
    recovery-enabled: true

# Logging
logging:
  level:
    com.example.foodshop.payment: INFO
    com.example.foodshop.payment.saga: INFO
    org.springframework.security: WARN
    org.springframework.data.redis: WARN
    root: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

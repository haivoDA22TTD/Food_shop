spring:
  jpa:
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        
logging:
  level:
    com.example.foodshop.order: INFO
    org.springframework.security: WARN
    org.springframework.data.redis: WARN
    root: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

management:
  endpoint:
    health:
      show-details: never
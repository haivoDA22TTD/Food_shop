# Use individual parameters (Aiven style)
spring.datasource.url=jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Server Configuration
server.port=${PORT:8080}
server.address=0.0.0.0

# Application URL
app.url=${APP_URL:https://your-app.onrender.com}

# JWT Configuration - Production (MUST be set via environment variables)
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Admin Account Configuration (Auto-create on startup)
admin.username=${ADMIN_USERNAME}
admin.password=${ADMIN_PASSWORD}
admin.email=${ADMIN_EMAIL}

# Google OAuth2 Configuration
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=profile,email
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/google

# Logging - Minimal for production
logging.level.org.springframework.security=WARN
logging.level.com.example.foodshop=INFO
logging.level.org.hibernate.SQL=WARN

# Security Headers
server.error.include-message=never
server.error.include-stacktrace=never

# Cloudinary - Enabled for production
cloudinary.enabled=${CLOUDINARY_ENABLED:true}
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}
cloudinary.folder=${CLOUDINARY_FOLDER:food-shop}

# Redis Configuration
# Use individual parameters (Aiven/Valkey style)
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT}
spring.data.redis.username=${REDIS_USERNAME:default}
spring.data.redis.password=${REDIS_PASSWORD}

# SSL Configuration (Aiven requires SSL)
spring.data.redis.ssl.enabled=${REDIS_SSL:false}

# Connection settings
spring.data.redis.timeout=60000
spring.data.redis.jedis.pool.max-active=8
spring.data.redis.jedis.pool.max-idle=8
spring.data.redis.jedis.pool.min-idle=0

# ============================================
# HEALTH CHECK
# ============================================
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always

# Application Info
spring.application.name=food-shop

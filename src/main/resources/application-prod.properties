# ============================================
# Production Profile (Render Deployment)
# ============================================

# Database Configuration - Railway MySQL (Public URL)
# Option 1: Use full connection string (recommended)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?useSSL=true&requireSSL=true&serverTimezone=UTC}

# Option 2: Use individual parameters
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Server Configuration
server.port=${PORT:8080}
server.address=0.0.0.0

# Application URL
app.url=${APP_URL:https://your-app.onrender.com}

# JWT Configuration - Production (MUST be set via environment variables)
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Logging - Minimal for production
logging.level.org.springframework.security=WARN
logging.level.com.example.foodshop=INFO
logging.level.org.hibernate.SQL=WARN

# Security Headers
server.error.include-message=never
server.error.include-stacktrace=never

# Cloudinary - Enabled for production
cloudinary.enabled=${CLOUDINARY_ENABLED:true}
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}
cloudinary.folder=${CLOUDINARY_FOLDER:food-shop}

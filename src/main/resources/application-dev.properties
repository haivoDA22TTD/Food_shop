# ============================================
# Development Profile (Local IDE)
# ============================================

# Database Configuration - Local MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/food_shop?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Server Configuration
server.port=8080

# Application URL
app.url=http://localhost:8080

# JWT Configuration - Development (simple key)
jwt.secret=5367566B59703373367639792F423F4528482B4D6251655468576D5A71347437
jwt.expiration=86400000

# Admin Account - Development (simple credentials)
ADMIN_USERNAME=admin
ADMIN_PASSWORD=admin123
ADMIN_EMAIL=admin@foodshop.com

# Customer Test Account - Development
CUSTOMER_USERNAME=customer
CUSTOMER_PASSWORD=customer123

# Logging - Verbose for development
logging.level.org.springframework.security=DEBUG
logging.level.com.example.foodshop=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Cloudinary - Disabled for local development (use local storage)
cloudinary.enabled=false

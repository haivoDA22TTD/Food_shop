name: Monorepo CI/CD

on:
  push:
    branches-ignore:
      - desktop
      - deploy
  pull_request:
    branches-ignore:
      - desktop
      - deploy

concurrency:
  group: monorepo-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect Changed Services
    runs-on: ubuntu-latest
    outputs:
      api_gateway: ${{ steps.filter.outputs.api_gateway }}
      eureka_server: ${{ steps.filter.outputs.eureka_server }}
      identity_service: ${{ steps.filter.outputs.identity_service }}
      order_service: ${{ steps.filter.outputs.order_service }}
      product_service: ${{ steps.filter.outputs.product_service }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            api_gateway:
              - 'api-gateway/**'
            eureka_server:
              - 'eureka-server/**'
            identity_service:
              - 'identity-service/**'
            order_service:
              - 'order-service/**'
            product_service:
              - 'product-service/**'
            frontend:
              - 'frontend/**'

  build-api-gateway:
    name: Build API Gateway
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.api_gateway == 'true'
    defaults:
      run:
        working-directory: api-gateway
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
      - name: Maven verify
        run: mvn -B verify

  build-eureka-server:
    name: Build Eureka Server
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.eureka_server == 'true'
    defaults:
      run:
        working-directory: eureka-server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
      - name: Maven verify
        run: mvn -B verify

  build-identity-service:
    name: Build Identity Service
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.identity_service == 'true'
    defaults:
      run:
        working-directory: identity-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
      - name: Maven verify
        run: mvn -B verify

  build-order-service:
    name: Build Order Service
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.order_service == 'true'
    defaults:
      run:
        working-directory: order-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
      - name: Maven verify
        run: mvn -B verify

  build-product-service:
    name: Build Product Service
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.product_service == 'true'
    defaults:
      run:
        working-directory: product-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
      - name: Maven verify
        run: mvn -B verify

  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Build frontend
        run: npm run build

  deploy-api-gateway:
    name: Deploy API Gateway
    runs-on: ubuntu-latest
    needs: [changes, build-api-gateway]
    if: github.event_name == 'push' && needs.changes.outputs.api_gateway == 'true' && (github.ref_name == 'API-Gateway' || github.ref_name == 'main')
    steps:
      - name: Trigger Render deploy hook
        if: ${{ secrets.RENDER_DEPLOY_HOOK_API_GATEWAY != '' }}
        run: curl -fsSL -X POST "${{ secrets.RENDER_DEPLOY_HOOK_API_GATEWAY }}"

  deploy-eureka-server:
    name: Deploy Eureka Server
    runs-on: ubuntu-latest
    needs: [changes, build-eureka-server]
    if: github.event_name == 'push' && needs.changes.outputs.eureka_server == 'true' && (github.ref_name == 'Service-Discovery' || github.ref_name == 'main')
    steps:
      - name: Trigger Render deploy hook
        if: ${{ secrets.RENDER_DEPLOY_HOOK_EUREKA_SERVER != '' }}
        run: curl -fsSL -X POST "${{ secrets.RENDER_DEPLOY_HOOK_EUREKA_SERVER }}"

  deploy-identity-service:
    name: Deploy Identity Service
    runs-on: ubuntu-latest
    needs: [changes, build-identity-service]
    if: github.event_name == 'push' && needs.changes.outputs.identity_service == 'true' && (github.ref_name == 'Identity-Service' || github.ref_name == 'main')
    steps:
      - name: Trigger Render deploy hook
        if: ${{ secrets.RENDER_DEPLOY_HOOK_IDENTITY_SERVICE != '' }}
        run: curl -fsSL -X POST "${{ secrets.RENDER_DEPLOY_HOOK_IDENTITY_SERVICE }}"

  deploy-order-service:
    name: Deploy Order Service
    runs-on: ubuntu-latest
    needs: [changes, build-order-service]
    if: github.event_name == 'push' && needs.changes.outputs.order_service == 'true' && (github.ref_name == 'Order-service' || github.ref_name == 'main')
    steps:
      - name: Trigger Render deploy hook
        if: ${{ secrets.RENDER_DEPLOY_HOOK_ORDER_SERVICE != '' }}
        run: curl -fsSL -X POST "${{ secrets.RENDER_DEPLOY_HOOK_ORDER_SERVICE }}"

  deploy-product-service:
    name: Deploy Product Service
    runs-on: ubuntu-latest
    needs: [changes, build-product-service]
    if: github.event_name == 'push' && needs.changes.outputs.product_service == 'true' && (github.ref_name == 'Product-Service' || github.ref_name == 'main')
    steps:
      - name: Trigger Render deploy hook
        if: ${{ secrets.RENDER_DEPLOY_HOOK_PRODUCT_SERVICE != '' }}
        run: curl -fsSL -X POST "${{ secrets.RENDER_DEPLOY_HOOK_PRODUCT_SERVICE }}"

  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    needs: [changes, build-frontend]
    if: github.event_name == 'push' && needs.changes.outputs.frontend == 'true' && (github.ref_name == 'Frontend' || github.ref_name == 'main')
    steps:
      - name: Trigger Render deploy hook
        if: ${{ secrets.RENDER_DEPLOY_HOOK_FRONTEND != '' }}
        run: curl -fsSL -X POST "${{ secrets.RENDER_DEPLOY_HOOK_FRONTEND }}"

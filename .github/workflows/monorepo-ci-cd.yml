name: Monorepo CI/CD

on:
  workflow_dispatch:
  push:
    branches-ignore:
      - desktop
      - deploy
  pull_request:
    branches-ignore:
      - desktop
      - deploy

concurrency:
  group: monorepo-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect Changed Services
    runs-on: ubuntu-latest
    outputs:
      api_gateway: ${{ steps.filter.outputs.api_gateway }}
      eureka_server: ${{ steps.filter.outputs.eureka_server }}
      identity_service: ${{ steps.filter.outputs.identity_service }}
      order_service: ${{ steps.filter.outputs.order_service }}
      product_service: ${{ steps.filter.outputs.product_service }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          base: ${{ github.event.before }}
          filters: |
            api_gateway:
              - 'api-gateway/**'
            eureka_server:
              - 'eureka-server/**'
            identity_service:
              - 'identity-service/**'
            order_service:
              - 'order-service/**'
            product_service:
              - 'product-service/**'
            frontend:
              - 'frontend/**'

  build-api-gateway:
    name: Build API Gateway
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.api_gateway == 'true' || github.ref_name == 'API-Gateway'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
      
      - name: Build with Maven
        working-directory: api-gateway
        run: mvn -B clean verify

  build-eureka-server:
    name: Build Eureka Server
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.eureka_server == 'true'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
      
      - name: Build with Maven
        working-directory: eureka-server
        run: mvn -B clean verify

  build-identity-service:
    name: Build Identity Service
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.identity_service == 'true'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
      
      - name: Build with Maven
        working-directory: identity-service
        run: mvn -B clean verify

  build-order-service:
    name: Build Order Service
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.order_service == 'true'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
      
      - name: Build with Maven
        working-directory: order-service
        run: mvn -B clean verify

  build-product-service:
    name: Build Product Service
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.product_service == 'true' || github.ref_name == 'Product-Service'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
      
      - name: Build with Maven
        working-directory: product-service
        run: mvn -B clean verify

  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Build frontend
        run: npm run build

  deploy-api-gateway:
    name: Deploy API Gateway
    runs-on: ubuntu-latest
    needs: [changes, build-api-gateway]
    if: github.event_name == 'push' && needs.changes.outputs.api_gateway == 'true'
    steps:
      - name: Trigger Render deploy hook
        env:
          DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK_API_GATEWAY }}
        run: |
          if [ -z "$DEPLOY_HOOK" ]; then
            echo "RENDER_DEPLOY_HOOK_API_GATEWAY is not set. Skipping deploy."
            exit 0
          fi
          curl -fsSL -X POST "$DEPLOY_HOOK"

  deploy-eureka-server:
    name: Deploy Eureka Server
    runs-on: ubuntu-latest
    needs: [changes, build-eureka-server]
    if: github.event_name == 'push' && needs.changes.outputs.eureka_server == 'true'
    steps:
      - name: Trigger Render deploy hook
        env:
          DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK_EUREKA_SERVER }}
        run: |
          if [ -z "$DEPLOY_HOOK" ]; then
            echo "RENDER_DEPLOY_HOOK_EUREKA_SERVER is not set. Skipping deploy."
            exit 0
          fi
          curl -fsSL -X POST "$DEPLOY_HOOK"

  deploy-identity-service:
    name: Deploy Identity Service
    runs-on: ubuntu-latest
    needs: [changes, build-identity-service]
    if: github.event_name == 'push' && needs.changes.outputs.identity_service == 'true'
    steps:
      - name: Trigger Render deploy hook
        env:
          DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK_IDENTITY_SERVICE }}
        run: |
          if [ -z "$DEPLOY_HOOK" ]; then
            echo "RENDER_DEPLOY_HOOK_IDENTITY_SERVICE is not set. Skipping deploy."
            exit 0
          fi
          curl -fsSL -X POST "$DEPLOY_HOOK"

  deploy-order-service:
    name: Deploy Order Service
    runs-on: ubuntu-latest
    needs: [changes, build-order-service]
    if: github.event_name == 'push' && needs.changes.outputs.order_service == 'true'
    steps:
      - name: Trigger Render deploy hook
        env:
          DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK_ORDER_SERVICE }}
        run: |
          if [ -z "$DEPLOY_HOOK" ]; then
            echo "RENDER_DEPLOY_HOOK_ORDER_SERVICE is not set. Skipping deploy."
            exit 0
          fi
          curl -fsSL -X POST "$DEPLOY_HOOK"

  deploy-product-service:
    name: Deploy Product Service
    runs-on: ubuntu-latest
    needs: [changes, build-product-service]
    if: github.event_name == 'push' && needs.changes.outputs.product_service == 'true'
    steps:
      - name: Trigger Render deploy hook
        env:
          DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK_PRODUCT_SERVICE }}
        run: |
          if [ -z "$DEPLOY_HOOK" ]; then
            echo "RENDER_DEPLOY_HOOK_PRODUCT_SERVICE is not set. Skipping deploy."
            exit 0
          fi
          curl -fsSL -X POST "$DEPLOY_HOOK"

  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    needs: [changes, build-frontend]
    if: github.event_name == 'push' && needs.changes.outputs.frontend == 'true'
    steps:
      - name: Trigger Render deploy hook
        env:
          DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK_FRONTEND }}
        run: |
          if [ -z "$DEPLOY_HOOK" ]; then
            echo "RENDER_DEPLOY_HOOK_FRONTEND is not set. Skipping deploy."
            exit 0
          fi
          curl -fsSL -X POST "$DEPLOY_HOOK"
